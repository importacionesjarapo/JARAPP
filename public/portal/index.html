<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Mi Pedido — Importaciones Jarapo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rojo: #D91010; --rojo-s: #b50e0e; --rojo-claro: #fff0f0;
      --ok: #059669; --warn: #d97706;
      --bg: #f5f5f7; --card: #ffffff; --txt: #1a1a1a; --txt2: #6b6b6b;
      --borde: #e8e8e8;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); min-height: 100vh; font-size: 15px; }

    /* ── HERO HEADER ── */
    .hero {
      background: linear-gradient(135deg, #c00d0d 0%, #D91010 60%, #b50000 100%);
      padding: 24px 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }
    .hero-avion {
      position: absolute;
      font-size: 80px;
      opacity: 0.09;
      pointer-events: none;
      line-height: 1;
    }
    .hero-logo-wrap {
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,0.2);
      width: 72%;
      max-width: 240px;
    }
    .hero-logo-img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }
    .hero-sub {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-align: center;
    }
    .hero-tel {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.15);
      padding: 4px 14px;
      border-radius: 20px;
      display: none;
    }

    /* ── CONTENEDOR ── */
    .container {
      max-width: 440px;
      margin: 0 auto;
      padding: 0 16px 48px;
      position: relative;
      z-index: 2;
    }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 14px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.07);
    }
    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--txt2);
      margin-bottom: 18px;
    }

    /* ── AUTH ── */
    .input-wrap { margin-bottom: 14px; }
    .input-wrap label { display: block; font-size: 13px; font-weight: 600; color: var(--txt2); margin-bottom: 8px; }
    .input-prefix { position: relative; }
    .input-prefix .pref { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--txt2); font-weight: 600; pointer-events: none; }
    input[type=tel] {
      width: 100%; border: 1.5px solid var(--borde); border-radius: 14px;
      padding: 14px 16px; font-size: 17px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; background: white; color: var(--txt);
    }
    input[type=tel]:focus { border-color: var(--rojo); box-shadow: 0 0 0 3px rgba(217,16,16,0.1); }
    .input-prefix input[type=tel] { padding-left: 52px; }

    .btn {
      width: 100%; background: var(--rojo); color: white; border: none;
      border-radius: 14px; padding: 16px; font-size: 17px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; letter-spacing: -0.3px;
    }
    .btn:active { transform: scale(0.97); background: var(--rojo-s); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-outline {
      width: 100%; background: transparent; color: var(--rojo);
      border: 1.5px solid var(--rojo); border-radius: 14px; padding: 15px;
      font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px;
      transition: all 0.2s;
    }
    .btn-outline:active { background: var(--rojo-claro); }

    .msg-err {
      background: var(--rojo-claro); border-left: 3px solid var(--rojo);
      border-radius: 10px; padding: 12px 14px; font-size: 13px;
      color: #900; margin-top: 12px; display: none;
    }

    /* ── OTP ── */
    .otp-grid { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
    .otp-digit {
      width: 48px !important; height: 58px; text-align: center; font-size: 26px;
      font-weight: 700; border: 1.5px solid var(--borde); border-radius: 14px;
      padding: 0 !important; transition: all 0.2s; background: var(--bg);
    }
    .otp-digit:focus { border-color: var(--rojo); background: white; box-shadow: 0 0 0 3px rgba(217,16,16,0.1); }
    .otp-sent { text-align: center; margin-bottom: 4px; }
    .otp-sent p { font-size: 13px; color: var(--txt2); }
    .otp-sent strong { font-size: 17px; color: var(--txt); display: block; margin-top: 2px; }
    .otp-timer { text-align: center; font-size: 13px; color: var(--txt2); margin-bottom: 16px; }
    .otp-timer span { color: var(--rojo); font-weight: 700; }

    /* ── BADGE TRACK ── */
    .track-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .badge {
      font-size: 11px; font-weight: 700; padding: 5px 12px;
      border-radius: 20px; letter-spacing: 0.3px;
    }
    .badge-colombia    { background: #e0f2e9; color: #0a5c2e; }
    .badge-encargo-usa { background: #e8eeff; color: #1a3fa3; }
    .badge-encargo-web { background: #fff4e0; color: #7a4500; }

    /* ── TIMELINE ── */
    .timeline { position: relative; padding-left: 36px; }
    .timeline::before { content: ''; position: absolute; left: 13px; top: 8px; bottom: 8px; width: 2px; background: var(--borde); border-radius: 2px; }
    .tl-item { position: relative; padding-bottom: 22px; }
    .tl-item:last-child { padding-bottom: 0; }
    .tl-dot {
      position: absolute; left: -30px; top: 0;
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid var(--borde); background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; z-index: 1; transition: all 0.3s;
    }
    .tl-item.done .tl-dot   { background: var(--ok); border-color: var(--ok); color: white; }
    .tl-item.active .tl-dot { background: var(--rojo); border-color: var(--rojo); color: white; box-shadow: 0 0 0 5px rgba(217,16,16,0.15); }
    .tl-nombre { font-size: 15px; font-weight: 700; color: var(--txt); line-height: 1.3; }
    .tl-desc   { font-size: 13px; color: var(--txt2); margin-top: 2px; line-height: 1.4; }
    .tl-item.pending .tl-nombre { font-weight: 400; color: var(--txt2); }
    .tl-item.pending .tl-desc   { display: none; }

    /* ── FECHA ESTIMADA ── */
    .fecha-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: #fff8e1; border: 1px solid #ffe082;
      border-radius: 10px; padding: 8px 14px;
      font-size: 13px; color: #7a5500; font-weight: 600;
      margin-top: 16px;
    }

    /* ── FINANCIERO ── */
    .fin-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--borde); font-size: 15px; }
    .fin-row:last-child { border-bottom: none; padding-top: 14px; }
    .fin-label { color: var(--txt2); }
    .fin-val { font-weight: 700; }
    .fin-ok   { color: var(--ok); }
    .fin-warn { color: var(--warn); }
    .fin-total-row { background: var(--bg); border-radius: 12px; padding: 14px 16px; margin-top: 4px; display: flex; justify-content: space-between; align-items: center; }
    .fin-total-label { font-size: 14px; color: var(--txt2); font-weight: 600; }
    .fin-total-val { font-size: 20px; font-weight: 800; }

    /* ── HISTORIAL ── */
    .hist-item { padding: 14px 0; border-bottom: 1px solid var(--borde); }
    .hist-item:last-child { border-bottom: none; }
    .hist-top { display: flex; justify-content: space-between; align-items: center; }
    .hist-estado { font-weight: 700; font-size: 14px; }
    .hist-monto { font-weight: 700; font-size: 15px; color: var(--rojo); }
    .hist-fecha { font-size: 12px; color: var(--txt2); margin-top: 3px; }

    /* ── SALUDO ── */
    .saludo-wrap { padding: 4px 0 16px; }
    .saludo-nombre { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
    .saludo-sub { font-size: 14px; color: var(--txt2); margin-top: 2px; }

    /* ── SPINNER ── */
    .spinner { width: 40px; height: 40px; border: 3px solid var(--borde); border-top-color: var(--rojo); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 40px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    .pedido-card {
      background: var(--card);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      border: 1.5px solid var(--borde);
    }
    .pedido-activo {
      border-color: var(--rojo);
      box-shadow: 0 4px 24px rgba(217,16,16,0.1);
    }
    .pedido-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .pedido-header-left {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      flex: 1;
      min-width: 0;
    }
    .pedido-img {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid var(--borde);
    }
    .pedido-img-placeholder {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: var(--bg);
      border: 1px solid var(--borde);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .pedido-producto {
      font-size: 14px;
      font-weight: 700;
      color: var(--txt);
      line-height: 1.3;
    }
    .pedido-marca {
      font-size: 12px;
      color: var(--txt2);
      margin-top: 2px;
    }
    .pedido-fecha {
      font-size: 11px;
      color: var(--txt2);
      margin-top: 3px;
    }
    .pedido-estado-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 14px;
    }
    .pedido-estado-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .pedido-estado-txt {
      font-size: 13px;
      font-weight: 700;
    }
    .pedido-fin { display: flex; flex-direction: column; gap: 6px; }
    .pedido-fin-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
    }
    .pedido-fin-label { color: var(--txt2); }
    .pedido-fin-val { font-weight: 600; }
    .pedido-progress-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
    }
    .pedido-progress-bar {
      flex: 1;
      height: 6px;
      background: var(--borde);
      border-radius: 10px;
      overflow: hidden;
    }
    .pedido-progress-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s ease;
    }
    .pedido-progress-pct {
      font-size: 11px;
      font-weight: 700;
      color: var(--txt2);
      min-width: 28px;
      text-align: right;
    }
    .pedido-saldo-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 6px;
      border-top: 1px solid var(--borde);
      margin-top: 2px;
    }
    .pedido-saldo-val { font-size: 15px; font-weight: 800; }
    .saldo-ok   { color: var(--ok); }
    .saldo-warn { color: var(--warn); }

    .pedido-timeline-wrap {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--borde);
    }
    .tl-mini { position: relative; padding-left: 28px; }
    .tl-mini::before {
      content: '';
      position: absolute;
      left: 9px; top: 8px; bottom: 8px;
      width: 2px;
      background: var(--borde);
      border-radius: 2px;
    }
    .tl-mini-item {
      position: relative;
      padding-bottom: 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .tl-mini-item:last-child { padding-bottom: 0; }
    .tl-mini-dot {
      position: absolute;
      left: -24px;
      top: 2px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--borde);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 800;
      flex-shrink: 0;
      z-index: 1;
    }
    .tl-mini-item.done .tl-mini-dot {
      background: var(--ok);
      border-color: var(--ok);
      color: white;
    }
    .tl-mini-item.active .tl-mini-dot {
      background: var(--rojo);
      border-color: var(--rojo);
      color: white;
      box-shadow: 0 0 0 4px rgba(217,16,16,0.15);
    }
    .tl-mini-item.pending .tl-mini-dot { background: white; }
    .tl-mini-txt { font-size: 13px; font-weight: 600; color: var(--txt); }
    .tl-mini-item.done .tl-mini-txt { color: var(--ok); }
    .tl-mini-item.active .tl-mini-txt { color: var(--rojo); }
    .tl-mini-item.pending .tl-mini-txt { color: var(--txt2); font-weight: 400; }
    .tl-mini-desc { font-size: 11px; color: var(--txt2); margin-top: 1px; }
    .tl-mini-item.pending .tl-mini-desc { display: none; }
    .ver-mas-btn {
      width: 100%;
      background: none;
      border: 1px solid var(--borde);
      border-radius: 10px;
      padding: 8px;
      font-size: 12px;
      color: var(--txt2);
      cursor: pointer;
      margin-top: 10px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .ver-mas-btn:hover { border-color: var(--rojo); color: var(--rojo); }

    .tabs-wrap { display: flex; gap: 8px; margin-bottom: 16px; background: white; border-radius: 14px; padding: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .tab-btn { flex: 1; padding: 10px 6px; border: none; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; background: transparent; color: var(--txt2); transition: all 0.2s; }
    .tab-btn.active { background: var(--rojo); color: white; box-shadow: 0 2px 8px rgba(217,16,16,0.3); }
    .pedido-card-mini { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 1.5px solid var(--borde); display: flex; gap: 14px; align-items: center; cursor: pointer; transition: all 0.2s; }
    .pedido-card-mini:active { transform: scale(0.98); }
    .pedido-card-mini.activo { border-color: var(--rojo); }
    .pedido-mini-img { width: 64px; height: 64px; border-radius: 12px; object-fit: cover; border: 1px solid var(--borde); flex-shrink: 0; }
    .pedido-mini-placeholder { width: 64px; height: 64px; border-radius: 12px; background: var(--bg); border: 1px solid var(--borde); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
    .pedido-mini-info { flex: 1; min-width: 0; }
    .pedido-mini-nombre { font-size: 14px; font-weight: 700; color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pedido-mini-marca { font-size: 12px; color: var(--txt2); margin-top: 2px; }
    .pedido-mini-fecha { font-size: 11px; color: var(--txt2); margin-top: 3px; }
    .pedido-mini-estado { display: inline-flex; align-items: center; gap: 5px; margin-top: 6px; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; background: var(--bg); }
    .pedido-mini-arrow { font-size: 20px; color: var(--txt2); flex-shrink: 0; }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--txt2); background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
    .btn-volver { display: flex; align-items: center; gap: 6px; background: none; border: none; font-size: 14px; font-weight: 700; color: var(--rojo); cursor: pointer; padding: 0; margin-bottom: 16px; }
    .detalle-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 14px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); border: 1.5px solid var(--borde); }
    .detalle-producto-header { display: flex; gap: 14px; align-items: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--borde); }
    .detalle-img { width: 80px; height: 80px; border-radius: 14px; object-fit: cover; border: 1px solid var(--borde); flex-shrink: 0; }
    .detalle-nombre { font-size: 17px; font-weight: 800; color: var(--txt); }
    .detalle-meta { font-size: 13px; color: var(--txt2); margin-top: 4px; }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero" id="hero">
  <span class="hero-avion" style="top:-10px;left:-18px;transform:rotate(-25deg);font-size:110px">✈</span>
  <span class="hero-avion" style="top:20px;right:-15px;transform:rotate(15deg);font-size:70px">✈</span>
  <span class="hero-avion" style="bottom:5px;left:10px;transform:rotate(-10deg);font-size:55px">✈</span>
  <span class="hero-avion" style="bottom:-5px;right:20px;transform:rotate(20deg);font-size:90px">✈</span>
  <div class="hero-logo-wrap">
    <img src="/logo_jarapo.png" alt="Importaciones Jarapo" class="hero-logo-img">
  </div>
  <div class="hero-sub" id="hero-sub">Seguimiento de tu pedido</div>
  <div class="hero-tel" id="hero-tel"></div>
</div>

<div class="container">

  <!-- LOADING -->
  <div id="pantalla-loading"><div class="spinner"></div></div>

  <!-- AUTH: TELÉFONO -->
  <div id="pantalla-auth" class="hidden">
    <div class="card">
      <div class="card-label">Ingresa tu número</div>
      <div class="input-wrap">
        <div class="input-prefix">
          <span class="pref">+57</span>
          <input type="tel" id="inp-tel" placeholder="3001234567" maxlength="10" inputmode="numeric">
        </div>
      </div>
      <button class="btn" id="btn-enviar">Enviar código por WhatsApp</button>
      <div class="msg-err" id="err-tel"></div>
    </div>
  </div>

  <!-- AUTH: OTP -->
  <div id="pantalla-otp" class="hidden">
    <div class="card">
      <div class="otp-sent">
        <p>Código enviado a</p>
        <strong id="otp-numero"></strong>
      </div>
      <div class="otp-grid">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-digit">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-digit">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-digit">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-digit">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-digit">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-digit">
      </div>
      <div class="otp-timer">Expira en <span id="otp-countdown">10:00</span></div>
      <button class="btn" id="btn-verificar">Verificar código</button>
      <button class="btn-outline" id="btn-reenviar">Reenviar código</button>
      <div class="msg-err" id="err-otp"></div>
    </div>
  </div>

  <!-- PORTAL -->
  <div id="pantalla-portal" class="hidden">
    <div id="portal-loading"><div class="spinner"></div></div>
    <div id="portal-contenido" class="hidden">
    <div class="saludo-wrap">
      <div class="saludo-nombre" id="saludo-nombre">Hola 👋</div>
      <div class="saludo-sub">Aquí están todos tus pedidos</div>
    </div>
    <div class="tabs-wrap">
      <button class="tab-btn active" onclick="cambiarTab('encurso',this)">En curso</button>
      <button class="tab-btn" onclick="cambiarTab('entregados',this)">Entregados</button>
      <button class="tab-btn" onclick="cambiarTab('cancelados',this)">Cancelados</button>
    </div>
    <div id="pedidos-lista"></div>
    <div id="pedido-detalle" class="hidden">
      <button class="btn-volver" onclick="volverLista()">← Volver a mis pedidos</button>
      <div id="detalle-contenido"></div>
    </div>
  </div>
  </div>

</div>

const hide = id => $(id).classList.add('hidden')

function pantalla(id) {
  ['pantalla-loading','pantalla-auth','pantalla-otp','pantalla-portal'].forEach(p =>
    $(p).classList.toggle('hidden', p !== id))
}

function cop(n) {
  return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0}).format(parseFloat(n)||0)
}
function fecha(s) {
  if(!s) return ''
  return new Date(s).toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'})
}

async function api(fn, body) {
  const r = await fetch(`${API}/${fn}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
  const d = await r.json()
  if(!r.ok) throw new Error(d.error||'Error desconocido')
  return d
}

// AUTH
$('btn-enviar').addEventListener('click', async () => {
  const tel = $('inp-tel').value.trim().replace(/\D/g,'')
  if(tel.length !== 10){ mostrarErr('err-tel','Ingresa un número válido de 10 dígitos'); return }
  $('btn-enviar').disabled = true
  $('btn-enviar').textContent = 'Enviando...'
  $('err-tel').style.display = 'none'
  try {
    await api('portal-otp',{accion:'solicitar',telefono:tel})
    est.tel = tel
    $('otp-numero').textContent = `+57 ${tel}`
    pantalla('pantalla-otp')
    document.querySelectorAll('.otp-digit')[0].focus()
    countdown()
  } catch(e) {
    mostrarErr('err-tel', e.message)
    $('btn-enviar').disabled = false
    $('btn-enviar').textContent = 'Enviar código por WhatsApp'
  }
})

document.querySelectorAll('.otp-digit').forEach((inp,i,all)=>{
  inp.addEventListener('input', e=>{
    e.target.value = e.target.value.replace(/\D/g,'').slice(-1)
    if(e.target.value && i < all.length-1) all[i+1].focus()
  })
  inp.addEventListener('keydown', e=>{
    if(e.key==='Backspace' && !e.target.value && i>0) all[i-1].focus()
  })
})

$('btn-verificar').addEventListener('click', verificar)
$('btn-reenviar').addEventListener('click', async ()=>{
  $('btn-reenviar').disabled = true
  try { await api('portal-otp',{accion:'solicitar',telefono:est.tel}); countdown() }
  catch(e){ mostrarErr('err-otp',e.message) }
  finally { setTimeout(()=>{ $('btn-reenviar').disabled=false },5000) }
})

async function verificar() {
  const otp = [...document.querySelectorAll('.otp-digit')].map(i=>i.value).join('')
  if(otp.length!==6){ mostrarErr('err-otp','Ingresa el código completo'); return }
  $('btn-verificar').disabled = true
  $('btn-verificar').textContent = 'Verificando...'
  try {
    const r = await api('portal-otp',{accion:'verificar',telefono:est.tel,otp})
    est.token = r.token
    est.cliente = {nombre: r.nombre}
    localStorage.setItem('jp_token', r.token)
    abrirPortal()
  } catch(e) {
    mostrarErr('err-otp', e.message)
    $('btn-verificar').disabled = false
    $('btn-verificar').textContent = 'Verificar código'
  }
}

let cdInt
function countdown() {
  clearInterval(cdInt)
  let s = 600
  cdInt = setInterval(()=>{
    s--
    const m = Math.floor(s/60), ss = s%60
    $('otp-countdown').textContent = `${m}:${ss.toString().padStart(2,'0')}`
    if(s<=0){ clearInterval(cdInt); $('otp-countdown').textContent='expirado' }
  },1000)
}

// PORTAL
async function abrirPortal() {
  pantalla('pantalla-portal')
  const nombre = est.cliente?.nombre || ''
  $('saludo-nombre').textContent = `Hola, ${nombre.split(' ')[0]} 👋`
  $('hero-sub').textContent = `Bienvenido, ${nombre.split(' ')[0]}`
  if(est.tel){ $('hero-tel').textContent = `+57 ${est.tel}`; $('hero-tel').style.display='block' }
  show('portal-loading'); hide('portal-contenido')
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/portal_cliente_view?portal_token=eq.${est.token}&select=*`,
      {headers:{'apikey':SUPABASE_ANON,'Authorization':`Bearer ${SUPABASE_ANON}`}})
    const datos = await r.json()
    console.log('[PORTAL] token usado:', est.token)
    console.log('[PORTAL] datos vista:', JSON.stringify(datos, null, 2))
    if (!Array.isArray(datos)) { console.error('[PORTAL] Error vista:', datos); return }
    renderPortal(datos)
  } catch(e){ console.error(e) }
  finally { hide('portal-loading'); show('portal-contenido') }
}

let todosLosPedidos = []
let tabActual = 'encurso'

function trackLabel(track) {
  const t = { colombia: '🇨🇴 Colombia', encargo_usa: '✈️ Encargo USA', encargo_web: '🛒 Web USA' }
  return t[track] || '🇨🇴 Colombia'
}
function trackCls(track) {
  const t = { colombia: 'badge-colombia', encargo_usa: 'badge-encargo-usa', encargo_web: 'badge-encargo-web' }
  return t[track] || 'badge-colombia'
}
function estadoCliente(v) {
  const faseLog = v.fase || ''
  const estadoVenta = v.estado_venta || ''
  const mapaFases = {
    '1. Comprado (Esperando Tracking Local USA)': { txt: 'Comprado en USA 🛍️',       color: '#7c3aed', num: 2 },
    '2. Comprado Local':                          { txt: 'Comprado en Colombia 🇨🇴',  color: '#2563eb', num: 1 },
    '3. En Bodega USA (Estados Unidos)':          { txt: 'En bodega USA 📦',           color: '#7c3aed', num: 3 },
    '4. En Camino a Colombia':                    { txt: 'En camino a Colombia ✈️',    color: '#0891b2', num: 4 },
    '5. En Aduana Colombia':                      { txt: 'En aduana / trámites 🛃',    color: '#d97706', num: 5 },
    '6. Entregado a Cliente Final':               { txt: '¡Entregado! 🎉',             color: '#059669', num: 9 },
    '7. En Bodega Medellín':                      { txt: 'Llegó a Medellín 📍',        color: '#059669', num: 6 },
    '8. Notificado al Cliente':                   { txt: 'Pedido confirmado 📞',        color: '#059669', num: 7 },
    '9. Enviado Interno Colombia':                { txt: 'En camino hacia ti 🚚',       color: '#059669', num: 8 },
  }
  if (faseLog && mapaFases[faseLog]) return mapaFases[faseLog]
  const mapaVenta = {
    'Comprado en tienda EEUU': { txt: 'Comprado en USA 🛍️',     color: '#7c3aed', num: 2 },
    'Validando Compra EEUU':   { txt: 'Validando compra USA 🔍', color: '#d97706', num: 1 },
    'Completado Local':        { txt: '¡Entregado! 🎉',          color: '#059669', num: 9 },
  }
  if (mapaVenta[estadoVenta]) return mapaVenta[estadoVenta]
  return { txt: 'En proceso', color: '#6b7280', num: 1 }
}

function tabDeEstado(v) {
  const fase  = (v.fase || '').toLowerCase()
  const estado = v.estado_venta || ''
  if (estado === 'Cancelado' || fase.includes('cancel')) return 'cancelados'
  if (v.fase === '6. Entregado a Cliente Final' || estado === 'Completado Local') return 'entregados'
  return 'encurso'
}

function renderTimeline(track, faseActual) {
  const fases = fasesTrack(track)
  return fases.map((f, i) => {
    const n = i + 1
    const cls = n < faseActual ? 'done' : n === faseActual ? 'active' : 'pending'
    const dot = n < faseActual ? '✓' : n === faseActual ? '●' : ''
    return `
      <div class="tl-mini-item ${cls}">
        <div class="tl-mini-dot">${dot}</div>
        <div>
          <div class="tl-mini-txt">${f.n}</div>
          ${cls !== 'pending' ? `<div class="tl-mini-desc">${f.d}</div>` : ''}
        </div>
      </div>`
  }).join('')
}

function cambiarTab(tab, btn) {
  tabActual = tab
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  renderLista()
}

function renderLista() {
  const filtrados = todosLosPedidos.filter(v => tabDeEstado(v) === tabActual)
  const lista = $('pedidos-lista')
  hide('pedido-detalle'); show('pedidos-lista')
  if (!filtrados.length) {
    const labels = { encurso: 'pedidos en curso', entregados: 'pedidos entregados', cancelados: 'pedidos cancelados' }
    lista.innerHTML = `<div class="empty-state"><div class="emoji">📭</div><p>No tienes ${labels[tabActual]} por ahora.</p></div>`
    return
  }
  lista.innerHTML = filtrados.map(v => {
    const estado = estadoCliente(v)
    const idx = todosLosPedidos.indexOf(v)
    return `
    <div class="pedido-card-mini" onclick="verDetalle(${idx})">
      ${v.url_imagen
        ? `<img src="${v.url_imagen}" class="pedido-mini-img" onerror="this.style.display='none'">`
        : `<div class="pedido-mini-placeholder">📦</div>`}
      <div class="pedido-mini-info">
        <div class="pedido-mini-nombre">${v.nombre_producto || 'Producto'}</div>
        <div class="pedido-mini-marca">${[v.marca, v.talla ? 'Talla ' + v.talla : ''].filter(Boolean).join(' · ')}</div>
        <div class="pedido-mini-fecha">${v.fecha_venta ? fecha(v.fecha_venta) : ''}</div>
        <div class="pedido-mini-estado" style="color:${estado.color}">
          <span style="width:7px;height:7px;border-radius:50%;background:${estado.color};display:inline-block"></span>
          ${estado.txt}
        </div>
      </div>
      <div class="pedido-mini-arrow">›</div>
    </div>`
  }).join('')
}

function verDetalle(idx) {
  const v = todosLosPedidos[idx]
  if (!v) return
  hide('pedidos-lista'); show('pedido-detalle')
  const saldo  = parseFloat(v.saldo_pendiente) || 0
  const pagado = parseFloat(v.total_abonado)   || 0
  const total  = parseFloat(v.total)            || 0
  const pct    = total > 0 ? Math.round((pagado / total) * 100) : 0
  const estado = estadoCliente(v)
  $('detalle-contenido').innerHTML = `
    <div class="detalle-card">
      <div class="detalle-producto-header">
        ${v.url_imagen
          ? `<img src="${v.url_imagen}" class="detalle-img" onerror="this.style.display='none'">`
          : `<div class="pedido-mini-placeholder">📦</div>`}
        <div>
          <div class="detalle-nombre">${v.nombre_producto || 'Producto'}</div>
          <div class="detalle-meta">${[v.marca, v.talla ? 'Talla ' + v.talla : ''].filter(Boolean).join(' · ')}</div>
          <div class="detalle-meta">${v.fecha_venta ? fecha(v.fecha_venta) : ''}</div>
          <span class="badge ${trackCls(v.track)}" style="margin-top:8px;display:inline-block">${trackLabel(v.track)}</span>
        </div>
      </div>
      <div class="pedido-estado-wrap">
        <div class="pedido-estado-dot" style="background:${estado.color}"></div>
        <div class="pedido-estado-txt" style="color:${estado.color}">${estado.txt}</div>
      </div>
      <div class="pedido-timeline-wrap" style="margin-top:14px">
        <div class="tl-mini">${renderTimeline(v.track, estado.num)}</div>
      </div>
    </div>
    <div class="detalle-card">
      <div class="pedido-fin">
        <div class="pedido-fin-row">
          <span class="pedido-fin-label">Total</span>
          <span class="pedido-fin-val">${cop(total)}</span>
        </div>
        <div class="pedido-fin-row">
          <span class="pedido-fin-label">Pagado</span>
          <span class="pedido-fin-val" style="color:var(--ok)">${cop(pagado)}</span>
        </div>
        <div class="pedido-progress-wrap">
          <div class="pedido-progress-bar">
            <div class="pedido-progress-fill" style="width:${pct}%;background:${saldo<=0?'var(--ok)':'var(--rojo)'}"></div>
          </div>
          <span class="pedido-progress-pct">${pct}%</span>
        </div>
        <div class="pedido-saldo-row">
          <span class="pedido-fin-label">Saldo pendiente</span>
          <span class="pedido-saldo-val ${saldo<=0?'saldo-ok':'saldo-warn'}">${saldo<=0?'¡Pagado ✓':cop(saldo)}</span>
        </div>
      </div>
    </div>`
}

function volverLista() {
  hide('pedido-detalle'); show('pedidos-lista')
}

function renderPortal(filas) {
  todosLosPedidos = filas
  tabActual = 'encurso'
  renderLista()
}

function mostrarErr(id, msg) { const el=$(id); el.textContent=msg; el.style.display='block' }

// INIT
async function init() {
  const params = new URLSearchParams(window.location.search)
  const tokenURL = params.get('t')
  const tokenGuardado = localStorage.getItem('jp_token')
  const token = tokenURL || tokenGuardado
  if (token) {
    try {
      const r = await api('portal-otp', { accion: 'validar_token', token_portal: token })
      if (r.ok) {
        est.token = token
        est.cliente = r.cliente
        est.tel = r.cliente?.whatsapp || r.cliente?.telefono
        if (tokenURL) localStorage.setItem('jp_token', tokenURL)
        abrirPortal()
        return
      } else {
        console.warn('Token inválido, limpiando...')
        localStorage.removeItem('jp_token')
      }
    } catch(e) {
      console.error('Error validando token:', e)
      localStorage.removeItem('jp_token')
    }
  }
  pantalla('pantalla-auth')
}
init()
