<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Mi Pedido — Importaciones Jarapo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rojo: #D91010; --rojo-s: #b50e0e; --rojo-claro: #fff0f0;
      --ok: #059669; --warn: #d97706;
      --bg: #f5f5f7; --card: #ffffff; --txt: #1a1a1a; --txt2: #6b6b6b;
      --borde: #e8e8e8;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); min-height: 100vh; font-size: 15px; }

    /* ── HERO HEADER ── */
    .hero {
      background: white;
      padding: 32px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--borde);
    }
    .hero-logo-img {
      width: 220px;
      object-fit: contain;
    }
    .hero-sub { color: var(--txt2); font-size: 13px; }
    .hero-tel { color: var(--txt2); font-size: 13px; display: none; }

    /* ── CONTENEDOR ── */
    .container {
      max-width: 440px;
      margin: 0 auto;
      padding: 0 16px 48px;
      position: relative;
      z-index: 2;
    }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 14px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.07);
    }
    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--txt2);
      margin-bottom: 18px;
    }

    /* ── AUTH ── */
    .input-wrap { margin-bottom: 14px; }
    .input-wrap label { display: block; font-size: 13px; font-weight: 600; color: var(--txt2); margin-bottom: 8px; }
    .input-prefix { position: relative; }
    .input-prefix .pref { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--txt2); font-weight: 600; pointer-events: none; }
    .input-prefix input { padding-left: 52px; }
    input[type=tel] {
      width: 100%; border: 1.5px solid var(--borde); border-radius: 14px;
      padding: 14px 16px; font-size: 17px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; background: white; color: var(--txt);
    }
    input[type=tel]:focus { border-color: var(--rojo); box-shadow: 0 0 0 3px rgba(217,16,16,0.1); }

    .btn {
      width: 100%; background: var(--rojo); color: white; border: none;
      border-radius: 14px; padding: 16px; font-size: 17px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; letter-spacing: -0.3px;
    }
    .btn:active { transform: scale(0.97); background: var(--rojo-s); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-outline {
      width: 100%; background: transparent; color: var(--rojo);
      border: 1.5px solid var(--rojo); border-radius: 14px; padding: 15px;
      font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px;
      transition: all 0.2s;
    }
    .btn-outline:active { background: var(--rojo-claro); }

    .msg-err {
      background: var(--rojo-claro); border-left: 3px solid var(--rojo);
      border-radius: 10px; padding: 12px 14px; font-size: 13px;
      color: #900; margin-top: 12px; display: none;
    }

    /* ── OTP ── */
    .otp-grid { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
    .otp-digit {
      width: 48px !important; height: 58px; text-align: center; font-size: 26px;
      font-weight: 700; border: 1.5px solid var(--borde); border-radius: 14px;
      padding: 0 !important; transition: all 0.2s; background: var(--bg);
    }
    .otp-digit:focus { border-color: var(--rojo); background: white; box-shadow: 0 0 0 3px rgba(217,16,16,0.1); }
    .otp-sent { text-align: center; margin-bottom: 4px; }
    .otp-sent p { font-size: 13px; color: var(--txt2); }
    .otp-sent strong { font-size: 17px; color: var(--txt); display: block; margin-top: 2px; }
    .otp-timer { text-align: center; font-size: 13px; color: var(--txt2); margin-bottom: 16px; }
    .otp-timer span { color: var(--rojo); font-weight: 700; }

    /* ── BADGE TRACK ── */
    .track-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .badge {
      font-size: 11px; font-weight: 700; padding: 5px 12px;
      border-radius: 20px; letter-spacing: 0.3px;
    }
    .badge-colombia    { background: #e0f2e9; color: #0a5c2e; }
    .badge-encargo-usa { background: #e8eeff; color: #1a3fa3; }
    .badge-encargo-web { background: #fff4e0; color: #7a4500; }

    /* ── TIMELINE ── */
    .timeline { position: relative; padding-left: 36px; }
    .timeline::before { content: ''; position: absolute; left: 13px; top: 8px; bottom: 8px; width: 2px; background: var(--borde); border-radius: 2px; }
    .tl-item { position: relative; padding-bottom: 22px; }
    .tl-item:last-child { padding-bottom: 0; }
    .tl-dot {
      position: absolute; left: -30px; top: 0;
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid var(--borde); background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; z-index: 1; transition: all 0.3s;
    }
    .tl-item.done .tl-dot   { background: var(--ok); border-color: var(--ok); color: white; }
    .tl-item.active .tl-dot { background: var(--rojo); border-color: var(--rojo); color: white; box-shadow: 0 0 0 5px rgba(217,16,16,0.15); }
    .tl-nombre { font-size: 15px; font-weight: 700; color: var(--txt); line-height: 1.3; }
    .tl-desc   { font-size: 13px; color: var(--txt2); margin-top: 2px; line-height: 1.4; }
    .tl-item.pending .tl-nombre { font-weight: 400; color: var(--txt2); }
    .tl-item.pending .tl-desc   { display: none; }

    /* ── FECHA ESTIMADA ── */
    .fecha-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: #fff8e1; border: 1px solid #ffe082;
      border-radius: 10px; padding: 8px 14px;
      font-size: 13px; color: #7a5500; font-weight: 600;
      margin-top: 16px;
    }

    /* ── FINANCIERO ── */
    .fin-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--borde); font-size: 15px; }
    .fin-row:last-child { border-bottom: none; padding-top: 14px; }
    .fin-label { color: var(--txt2); }
    .fin-val { font-weight: 700; }
    .fin-ok   { color: var(--ok); }
    .fin-warn { color: var(--warn); }
    .fin-total-row { background: var(--bg); border-radius: 12px; padding: 14px 16px; margin-top: 4px; display: flex; justify-content: space-between; align-items: center; }
    .fin-total-label { font-size: 14px; color: var(--txt2); font-weight: 600; }
    .fin-total-val { font-size: 20px; font-weight: 800; }

    /* ── HISTORIAL ── */
    .hist-item { padding: 14px 0; border-bottom: 1px solid var(--borde); }
    .hist-item:last-child { border-bottom: none; }
    .hist-top { display: flex; justify-content: space-between; align-items: center; }
    .hist-estado { font-weight: 700; font-size: 14px; }
    .hist-monto { font-weight: 700; font-size: 15px; color: var(--rojo); }
    .hist-fecha { font-size: 12px; color: var(--txt2); margin-top: 3px; }

    /* ── SALUDO ── */
    .saludo-wrap { padding: 4px 0 16px; }
    .saludo-nombre { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
    .saludo-sub { font-size: 14px; color: var(--txt2); margin-top: 2px; }

    /* ── SPINNER ── */
    .spinner { width: 40px; height: 40px; border: 3px solid var(--borde); border-top-color: var(--rojo); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 40px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero" id="hero">
  <img src="/logo_jarapo.png" alt="Importaciones Jarapo" class="hero-logo-img">
  <div class="hero-sub" id="hero-sub">Seguimiento de tu pedido</div>
  <div class="hero-tel" id="hero-tel"></div>
</div>

<div class="container">

  <!-- LOADING -->
  <div id="pantalla-loading"><div class="spinner"></div></div>

  <!-- AUTH: TELÉFONO -->
  <div id="pantalla-auth" class="hidden">
    <div class="card">
      <div class="card-label">Ingresa tu número</div>
      <div class="input-wrap">
        <div class="input-prefix">
          <span class="pref">+57</span>
          <input type="tel" id="inp-tel" placeholder="3001234567" maxlength="10" inputmode="numeric">
        </div>
      </div>
      <button class="btn" id="btn-enviar">Enviar código por WhatsApp</button>
      <div class="msg-err" id="err-tel"></div>
    </div>
  </div>

  <!-- AUTH: OTP -->
  <div id="pantalla-otp" class="hidden">
    <div class="card">
      <div class="otp-sent">
        <p>Código enviado a</p>
        <strong id="otp-numero"></strong>
      </div>
      <div class="otp-grid">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-digit">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-digit">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-digit">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-digit">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-digit">
        <input type="tel" maxlength="1" inputmode="numeric" class="otp-digit">
      </div>
      <div class="otp-timer">Expira en <span id="otp-countdown">10:00</span></div>
      <button class="btn" id="btn-verificar">Verificar código</button>
      <button class="btn-outline" id="btn-reenviar">Reenviar código</button>
      <div class="msg-err" id="err-otp"></div>
    </div>
  </div>

  <!-- PORTAL -->
  <div id="pantalla-portal" class="hidden">
    <div id="portal-loading"><div class="spinner"></div></div>
    <div id="portal-contenido" class="hidden">

      <div class="saludo-wrap">
        <div class="saludo-nombre" id="saludo-nombre">Hola 👋</div>
        <div class="saludo-sub">Aquí está el estado de tu pedido</div>
      </div>

      <!-- Seguimiento -->
      <div class="card">
        <div class="track-header">
          <div class="card-label" style="margin-bottom:0">Estado del pedido</div>
          <span class="badge" id="badge-track"></span>
        </div>
        <div class="timeline" id="timeline"></div>
        <div id="fecha-chip-wrap"></div>
      </div>

      <!-- Financiero -->
      <div class="card">
        <div class="card-label">Resumen de pago</div>
        <div class="fin-row">
          <span class="fin-label">Total del pedido</span>
          <span class="fin-val" id="fin-total"></span>
        </div>
        <div class="fin-row">
          <span class="fin-label">Pagado</span>
          <span class="fin-val fin-ok" id="fin-pagado"></span>
        </div>
        <div class="fin-total-row">
          <span class="fin-total-label">Saldo pendiente</span>
          <span class="fin-total-val" id="fin-saldo"></span>
        </div>
      </div>

      <!-- Historial -->
      <div class="card" id="card-historial">
        <div class="card-label">Historial de pedidos</div>
        <div id="historial"></div>
      </div>

    </div>
  </div>

</div>

<script>
const SUPABASE_URL  = 'https://vygfsqdveudpzytnnhiq.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5Z2ZzcWR2ZXVkcHp5dG5uaGlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU4MDgxOTUsImV4cCI6MjA2MTM4NDE5NX0.lylyM3aTMmRatMPEJFMKAXBPmfcBnSHcmHraFDOFHHk'
const API = '/.netlify/functions'
const est = { token: null, tel: null, cliente: null }

const $ = id => document.getElementById(id)
const show = id => $(id).classList.remove('hidden')
const hide = id => $(id).classList.add('hidden')

function pantalla(id) {
  ['pantalla-loading','pantalla-auth','pantalla-otp','pantalla-portal'].forEach(p =>
    $(p).classList.toggle('hidden', p !== id))
}

function cop(n) {
  return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0}).format(parseFloat(n)||0)
}
function fecha(s) {
  if(!s) return ''
  return new Date(s).toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'})
}

async function api(fn, body) {
  const r = await fetch(`${API}/${fn}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
  const d = await r.json()
  if(!r.ok) throw new Error(d.error||'Error desconocido')
  return d
}

const TRACKS = {
  colombia:{ label:'🇨🇴 Colombia', cls:'badge-colombia', fases:[
    {n:'Pedido confirmado',d:'Tu pedido ha sido registrado y confirmado'},
    {n:'Producto reservado',d:'Tu producto está reservado en nuestra bodega'},
    {n:'En preparación / empaque',d:'Estamos preparando y empacando tu pedido'},
    {n:'Listo para entrega',d:'Tu pedido está listo, coordinando la entrega'},
    {n:'Enviado',d:'Tu pedido está en camino hacia ti'},
    {n:'Entregado',d:'¡Tu pedido fue entregado con éxito!'}
  ]},
  encargo_usa:{ label:'✈️ Encargo USA', cls:'badge-encargo-usa', fases:[
    {n:'Pedido confirmado',d:'Tu encargo ha sido registrado y confirmado'},
    {n:'Compra realizada en USA',d:'Tu producto fue comprado en tienda de Estados Unidos'},
    {n:'En camino a Colombia',d:'Tu producto está viajando desde USA hacia Colombia'},
    {n:'En aduana / trámites',d:'Tu producto está en proceso de aduana en Colombia'},
    {n:'Llegó a bodega en Medellín',d:'Tu producto llegó a nuestra bodega en Medellín'},
    {n:'Pedido confirmado al cliente',d:'Nos comunicamos contigo para coordinar la entrega'},
    {n:'En preparación / empaque',d:'Estamos preparando y empacando tu pedido'},
    {n:'Enviado',d:'Tu pedido está en camino hacia ti'},
    {n:'Entregado',d:'¡Tu encargo llegó con éxito!'}
  ]},
  encargo_web:{ label:'🛒 Web USA', cls:'badge-encargo-web', fases:[
    {n:'Pedido confirmado',d:'Tu encargo ha sido registrado y confirmado'},
    {n:'Compra realizada en USA',d:'Tu producto fue comprado en tienda online de USA'},
    {n:'En camino a bodega USA',d:'Tu producto se dirige a nuestra bodega en USA'},
    {n:'En camino a Colombia',d:'Tu producto está en tránsito desde USA a Colombia'},
    {n:'En aduana / trámites',d:'Tu producto está en proceso de aduana en Colombia'},
    {n:'Llegó a bodega en Medellín',d:'Tu producto llegó a nuestra bodega en Medellín'},
    {n:'Pedido confirmado al cliente',d:'Nos comunicamos contigo para coordinar la entrega'},
    {n:'En preparación / empaque',d:'Estamos preparando y empacando tu pedido'},
    {n:'Enviado',d:'Tu pedido está en camino hacia ti'},
    {n:'Entregado',d:'¡Tu encargo llegó con éxito!'}
  ]}
}

// AUTH
$('btn-enviar').addEventListener('click', async () => {
  const tel = $('inp-tel').value.trim().replace(/\D/g,'')
  if(tel.length !== 10){ mostrarErr('err-tel','Ingresa un número válido de 10 dígitos'); return }
  $('btn-enviar').disabled = true
  $('btn-enviar').textContent = 'Enviando...'
  $('err-tel').style.display = 'none'
  try {
    await api('portal-otp',{accion:'solicitar',telefono:tel})
    est.tel = tel
    $('otp-numero').textContent = `+57 ${tel}`
    pantalla('pantalla-otp')
    document.querySelectorAll('.otp-digit')[0].focus()
    countdown()
  } catch(e) {
    mostrarErr('err-tel', e.message)
    $('btn-enviar').disabled = false
    $('btn-enviar').textContent = 'Enviar código por WhatsApp'
  }
})

document.querySelectorAll('.otp-digit').forEach((inp,i,all)=>{
  inp.addEventListener('input', e=>{
    e.target.value = e.target.value.replace(/\D/g,'').slice(-1)
    if(e.target.value && i < all.length-1) all[i+1].focus()
  })
  inp.addEventListener('keydown', e=>{
    if(e.key==='Backspace' && !e.target.value && i>0) all[i-1].focus()
  })
})

$('btn-verificar').addEventListener('click', verificar)
$('btn-reenviar').addEventListener('click', async ()=>{
  $('btn-reenviar').disabled = true
  try { await api('portal-otp',{accion:'solicitar',telefono:est.tel}); countdown() }
  catch(e){ mostrarErr('err-otp',e.message) }
  finally { setTimeout(()=>{ $('btn-reenviar').disabled=false },5000) }
})

async function verificar() {
  const otp = [...document.querySelectorAll('.otp-digit')].map(i=>i.value).join('')
  if(otp.length!==6){ mostrarErr('err-otp','Ingresa el código completo'); return }
  $('btn-verificar').disabled = true
  $('btn-verificar').textContent = 'Verificando...'
  try {
    const r = await api('portal-otp',{accion:'verificar',telefono:est.tel,otp})
    est.token = r.token
    est.cliente = {nombre: r.nombre}
    localStorage.setItem('jp_token', r.token)
    abrirPortal()
  } catch(e) {
    mostrarErr('err-otp', e.message)
    $('btn-verificar').disabled = false
    $('btn-verificar').textContent = 'Verificar código'
  }
}

let cdInt
function countdown() {
  clearInterval(cdInt)
  let s = 600
  cdInt = setInterval(()=>{
    s--
    const m = Math.floor(s/60), ss = s%60
    $('otp-countdown').textContent = `${m}:${ss.toString().padStart(2,'0')}`
    if(s<=0){ clearInterval(cdInt); $('otp-countdown').textContent='expirado' }
  },1000)
}

// PORTAL
async function abrirPortal() {
  pantalla('pantalla-portal')
  const nombre = est.cliente?.nombre || ''
  $('saludo-nombre').textContent = `Hola, ${nombre.split(' ')[0]} 👋`
  $('hero-sub').textContent = `Bienvenido, ${nombre.split(' ')[0]}`
  if(est.tel){ $('hero-tel').textContent = `+57 ${est.tel}`; $('hero-tel').style.display='block' }
  show('portal-loading'); hide('portal-contenido')
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/portal_cliente_view?portal_token=eq.${est.token}&select=*`,
      {headers:{'apikey':SUPABASE_ANON,'Authorization':`Bearer ${SUPABASE_ANON}`}})
    const datos = await r.json()
    renderPortal(datos)
  } catch(e){ console.error(e) }
  finally { hide('portal-loading'); show('portal-contenido') }
}

function renderPortal(filas) {
  if(!filas||filas.length===0){
    $('portal-contenido').innerHTML='<div class="card" style="text-align:center;color:var(--txt2);padding:40px 24px;">No encontramos pedidos para tu número.</div>'
    return
  }
  const activo = filas[0]
  const historial = filas.slice(1)
  const track = TRACKS[activo.track] || TRACKS.colombia
  $('badge-track').textContent = track.label
  $('badge-track').className = 'badge ' + track.cls

  const fase = activo.fase_portal_num || 1
  $('timeline').innerHTML = track.fases.map((f,i)=>{
    const n = i+1
    const cls = n < fase ? 'done' : n === fase ? 'active' : 'pending'
    const dot = n < fase ? '✓' : n === fase ? '●' : ''
    return `<div class="tl-item ${cls}"><div class="tl-dot">${dot}</div><div class="tl-nombre">${f.n}</div>${cls!=='pending'?`<div class="tl-desc">${f.d}</div>`:''}</div>`
  }).join('')

  if(activo.fecha_estimada) {
    $('fecha-chip-wrap').innerHTML = `<div class="fecha-chip">📅 Entrega estimada: ${fecha(activo.fecha_estimada)}</div>`
  }

  $('fin-total').textContent = cop(activo.total)
  $('fin-pagado').textContent = cop(activo.total_abonado)
  const saldo = parseFloat(activo.saldo_pendiente)||0
  $('fin-saldo').textContent = saldo <= 0 ? '¡Pagado ✓' : cop(saldo)
  $('fin-saldo').className = 'fin-total-val ' + (saldo <= 0 ? 'fin-ok' : 'fin-warn')

  $('historial').innerHTML = historial.length === 0
    ? '<p style="font-size:14px;color:var(--txt2)">Este es tu primer pedido con nosotros. ¡Gracias por confiar en Jarapo!</p>'
    : historial.map(v=>`
      <div class="hist-item">
        <div class="hist-top">
          <span class="hist-estado">${v.estado_venta||'Pedido'}</span>
          <span class="hist-monto">${cop(v.total)}</span>
        </div>
        <div class="hist-fecha">${fecha(v.fecha_venta)} · Saldo: ${cop(v.saldo_pendiente)}</div>
      </div>`).join('')
}

function mostrarErr(id, msg) { const el=$(id); el.textContent=msg; el.style.display='block' }

// INIT
async function init() {
  const params = new URLSearchParams(window.location.search)
  const token = params.get('t') || localStorage.getItem('jp_token')
  if(token) {
    try {
      const r = await api('portal-otp',{accion:'validar_token',token_portal:token})
      if(r.ok) {
        est.token = token
        est.cliente = r.cliente
        est.tel = r.cliente?.whatsapp || r.cliente?.telefono
        if(params.get('t')) localStorage.setItem('jp_token', token)
        abrirPortal(); return
      }
    } catch { localStorage.removeItem('jp_token') }
  }
  pantalla('pantalla-auth')
}
init()
</script>
</body>
</html>
